name: generate-commit-wave
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests numpy matplotlib
      - name: generate wave
        env:
          USERNAME: pallejeevan24
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_wave.py
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A dist
          git diff --staged --quiet || git commit -m "update commit wave"
          git pull --rebase
          git push
